name: "Build"

on:
  workflow_call:
    inputs:
      publish-coverage:
        description: "Publish coverage data to Codecov"
        required: false
        type: "boolean"
        default: false

      docker-image-development-tag:
        description: "Use Docker image tag: development"
        required: false
        type: "boolean"
        default: false

      docker-image-version-tag:
        description: "Use Docker image version tag: e.g. 1.2.3"
        required: false
        type: "boolean"
        default: false

      docker-image-latest-tag:
        description: "Use Docker image tag: latest"
        required: false
        type: "boolean"
        default: false

      push-docker-image:
        description: "Push the Docker image to Docker Hub"
        required: false
        type: "boolean"
        default: false

    outputs:
      version:
        description: "cdrdao2audio version"
        value: "${{ jobs.version.outputs.version }}"

    secrets:
      CODECOV_TOKEN:
        required: false
      DOCKER_USER:
        required: false
      DOCKER_TOKEN:
        required: false

jobs:
  version:
    name: "Get version"
    runs-on: "ubuntu-latest"
    outputs:
      version: "${{ steps.version.outputs.version }}"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"
        with:
          fetch-depth: 0

      - name: "Get version"
        id: "version"
        shell: "bash"
        run: |
          version="$(make version)"
          echo "version=${version#v}" >> "$GITHUB_OUTPUT"

  validate-and-test:
    name: "Validate and test"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"
        with:
          fetch-depth: 0

      - name: "Set up Go"
        uses: "actions/setup-go@v7.0.0"
        with:
          go-version: "1.26.5"
          cache: true

      - name: "Download dependencies"
        run: "go mod download"

      - name: "Run `make validate`"
        run: "make validate"

      - name: "Run `make test`"
        run: "make test"

      - name: "Upload coverage data"
        uses: "actions/upload-artifact@v7.0.1"
        with:
          name: "Coverage Data"
          path: "build/tests/coverage.out"
          if-no-files-found: "error"

      - name: "Upload coverage report"
        uses: "actions/upload-artifact@v7.0.1"
        with:
          name: "Coverage Report"
          path: "build/reports/coverage.html"
          if-no-files-found: "error"

      - name: "Publish coverage data to Codecov"
        if: "${{ inputs.publish-coverage }}"
        uses: "codecov/codecov-action@v7.0.0"
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          files: "build/tests/coverage.out"

  build:
    name: "Build ${{ matrix.goos }}/${{ matrix.goarch }}"
    needs:
      - "validate-and-test"
    runs-on: "${{ matrix.runs-on }}"

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: "darwin"
            goarch: "amd64"
            runs-on: "macos-26-intel"

          - goos: "darwin"
            goarch: "arm64"
            runs-on: "macos-latest"

          - goos: "linux"
            goarch: "386"
            runs-on: "ubuntu-latest"

          - goos: "linux"
            goarch: "amd64"
            runs-on: "ubuntu-latest"

          - goos: "linux"
            goarch: "arm"
            runs-on: "ubuntu-latest"

          - goos: "linux"
            goarch: "arm64"
            runs-on: "ubuntu-latest"

          - goos: "windows"
            goarch: "amd64"
            runs-on: "windows-latest"

          - goos: "windows"
            goarch: "arm64"
            runs-on: "windows-latest"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"
        with:
          fetch-depth: 0

      - name: "Set up Go"
        uses: "actions/setup-go@v7.0.0"
        with:
          go-version: "1.26.5"
          cache: true

      - name: "Download dependencies"
        run: "go mod download"

      - name: "Build cdrdao2audio for ${{ matrix.goos }}/${{ matrix.goarch }}"
        shell: "bash"
        env:
          GOOS: "${{ matrix.goos }}"
          GOARCH: "${{ matrix.goarch }}"
        run: "make build"

      - name: "Upload build artifact"
        uses: "actions/upload-artifact@v7.0.1"
        with:
          name: "cdrdao2audio-${{ matrix.goos }}-${{ matrix.goarch }}"
          path: "build/bin/cdrdao2audio${{ matrix.goos == 'windows' && '.exe' || '' }}"
          if-no-files-found: "error"

  lint-dockerfile:
    name: "Lint Dockerfile"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"

      - name: "Lint `Dockerfile` with Hadolint"
        uses: "hadolint/hadolint-action@v3.3.0"
        with:
          dockerfile: "Dockerfile"
          failure-threshold: "style"

  build-docker-image:
    name: "Build Docker image"
    needs:
      - "version"
      - "lint-dockerfile"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"
        with:
          fetch-depth: 0

      - name: "Log in to Docker Hub"
        if: "${{ inputs.push-docker-image }}"
        uses: "docker/login-action@v4.4.0"
        with:
          username: "${{ secrets.DOCKER_USER }}"
          password: "${{ secrets.DOCKER_TOKEN }}"

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@v4.2.0"

      - name: "Build Docker image"
        uses: "docker/build-push-action@v7.3.0"
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: "."
          file: "Dockerfile"
          platforms: "linux/386,linux/amd64,linux/arm,linux/arm64"
          tags: |
            ${{ inputs.docker-image-development-tag && 'pfolta/cdrdao2audio:development' || '' }}
            ${{ inputs.docker-image-version-tag && format('pfolta/cdrdao2audio:{0}', needs.version.outputs.version) || '' }}
            ${{ inputs.docker-image-latest-tag && 'pfolta/cdrdao2audio:latest' || '' }}
          push: "${{ inputs.push-docker-image }}"
