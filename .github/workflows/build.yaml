name: "Build cdrdao2wav"

on:
  push:
  pull_request:

jobs:
  test:
    name: "Test"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"

      - name: "Set up Go"
        uses: "actions/setup-go@v6.4.0"
        with:
          go-version: "1.26.4"
          cache: true

      - name: "Download dependencies"
        run: "go mod download"

      - name: "Run `make lint`"
        run: "make lint"

      - name: "Run `make test`"
        run: "make test"

      - name: "Upload coverage data"
        uses: "actions/upload-artifact@v7.0.1"
        with:
          name: "Coverage Data"
          path: "build/tests/coverage.out"

      - name: "Upload coverage report"
        uses: "actions/upload-artifact@v7.0.1"
        with:
          name: "Coverage Report"
          path: "build/reports/coverage.html"

  build:
    name: "Build ${{ matrix.goos }}/${{ matrix.goarch }}"
    needs: "test"
    runs-on: "${{ matrix.runs-on }}"

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: "linux"
            goarch: "amd64"
            runs-on: "ubuntu-latest"

          - goos: "linux"
            goarch: "arm64"
            runs-on: "ubuntu-latest"

          - goos: "windows"
            goarch: "amd64"
            runs-on: "windows-latest"

          - goos: "windows"
            goarch: "arm64"
            runs-on: "windows-latest"

          - goos: "darwin"
            goarch: "arm64"
            runs-on: "macos-latest"

          - goos: "darwin"
            goarch: "amd64"
            runs-on: "macos-latest"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"

      - name: "Set up Go"
        uses: "actions/setup-go@v6.4.0"
        with:
          go-version: "1.26.4"
          cache: true

      - name: "Download dependencies"
        run: "go mod download"

      - name: "Build cdrdao2wav for ${{ matrix.goos }}/${{ matrix.goarch }}"
        shell: "bash"
        env:
          GOOS: "${{ matrix.goos }}"
          GOARCH: "${{ matrix.goarch }}"
        run: "make build"

      - name: "Upload build artifact"
        uses: "actions/upload-artifact@v7.0.1"
        with:
          name: "cdrdao2wav-${{ matrix.goos }}-${{ matrix.goarch }}"
          path: "build/bin/cdrdao2wav${{ matrix.goos == 'windows' && '.exe' || '' }}"
