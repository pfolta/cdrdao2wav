name: "Build cdrdao2audio"

on:
  push:

jobs:
  lint-and-test:
    name: "Lint and Test"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"
        with:
          fetch-depth: 0

      - name: "Set up Go"
        uses: "actions/setup-go@v6.4.0"
        with:
          go-version: "1.26.4"
          cache: true

      - name: "Download dependencies"
        run: "go mod download"

      - name: "Run `make lint`"
        run: "make lint"

      - name: "Run `make test`"
        run: "make test"

      - name: "Upload coverage data"
        uses: "actions/upload-artifact@v7.0.1"
        with:
          name: "Coverage Data"
          path: "build/tests/coverage.out"

      - name: "Upload coverage report"
        uses: "actions/upload-artifact@v7.0.1"
        with:
          name: "Coverage Report"
          path: "build/reports/coverage.html"

      - name: "Publish coverage data to Codecov"
        if: "github.ref == 'refs/heads/master'"
        uses: "codecov/codecov-action@v5.5.1"
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          files: "build/tests/coverage.out"

  build:
    name: "Build ${{ matrix.goos }}/${{ matrix.goarch }}"
    needs: "lint-and-test"
    runs-on: "${{ matrix.runs-on }}"

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: "darwin"
            goarch: "amd64"
            runs-on: "macos-26-intel"

          - goos: "darwin"
            goarch: "arm64"
            runs-on: "macos-latest"

          - goos: "linux"
            goarch: "386"
            runs-on: "ubuntu-latest"

          - goos: "linux"
            goarch: "amd64"
            runs-on: "ubuntu-latest"

          - goos: "linux"
            goarch: "arm"
            runs-on: "ubuntu-latest"

          - goos: "linux"
            goarch: "arm64"
            runs-on: "ubuntu-latest"

          - goos: "windows"
            goarch: "amd64"
            runs-on: "windows-latest"

          - goos: "windows"
            goarch: "arm64"
            runs-on: "windows-latest"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"
        with:
          fetch-depth: 0

      - name: "Set up Go"
        uses: "actions/setup-go@v6.4.0"
        with:
          go-version: "1.26.4"
          cache: true

      - name: "Download dependencies"
        run: "go mod download"

      - name: "Build cdrdao2audio for ${{ matrix.goos }}/${{ matrix.goarch }}"
        shell: "bash"
        env:
          GOOS: "${{ matrix.goos }}"
          GOARCH: "${{ matrix.goarch }}"
        run: "make build"

      - name: "Upload build artifact"
        uses: "actions/upload-artifact@v7.0.1"
        with:
          name: "cdrdao2audio-${{ matrix.goos }}-${{ matrix.goarch }}"
          path: "build/bin/cdrdao2audio${{ matrix.goos == 'windows' && '.exe' || '' }}"

  lint-dockerfile:
    name: "Lint Dockerfile"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"

      - name: "Lint `Dockerfile` with Hadolint"
        uses: "hadolint/hadolint-action@v3.3.0"
        with:
          dockerfile: "Dockerfile"
          failure-threshold: "style"

  build-docker-image:
    name: "Build Docker Image"
    needs: "lint-dockerfile"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"
        with:
          fetch-depth: 0

      - name: "Get version"
        id: "version"
        shell: "bash"
        run: |
          version="$(make version)"
          echo "version=${version#v}" >> "$GITHUB_OUTPUT"

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@v4.2.0"

      - name: "Build Docker Image"
        uses: "docker/build-push-action@v7.3.0"
        with:
          context: "."
          file: "Dockerfile"
          platforms: "linux/386,linux/amd64,linux/arm,linux/arm64"
          tags: |
            pfolta/cdrdao2audio:latest
            pfolta/cdrdao2audio:${{ steps.version.outputs.version }}
          push: false
