name: "Release"

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: "write"

jobs:
  build:
    name: "Build"
    uses: "./.github/workflows/build.yaml"
    with:
      publish-coverage: false
      docker-image-development-tag: false
      docker-image-version-tag: true
      docker-image-latest-tag: true
      push-docker-image: true
    secrets: "inherit"

  release:
    name: "GitHub Release"
    needs:
      - "build"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"
        with:
          fetch-depth: 0

      - name: "Download build artifacts"
        uses: "actions/download-artifact@v7.0.0"
        with:
          pattern: "cdrdao2audio-*"
          path: "release"
      
      - name: "Rename release artifacts"
        shell: "bash"
        run: |
          version="${{ needs.build.outputs.version }}"

          shopt -s nullglob
          artifacts=(release/cdrdao2audio-*/cdrdao2audio*)

          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No release artifacts found"
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            directory="$(basename "$(dirname "$artifact")")"
            platform="${directory#cdrdao2audio-}"

            if [[ "$artifact" == *.exe ]]; then
              extension=".exe"
            else
              extension=""
            fi

            mv "$artifact" \
              "release/cdrdao2audio-${version}-${platform}${extension}"
          done

          find release -type d -empty -delete
      
      - name: "Generate checksums"
        shell: "bash"
        run: |
          cd release
          sha256sum * > SHA256SUMS

      - name: "Create GitHub Release"
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          gh release create \
            "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --prerelease="${{ startsWith(github.ref_name, 'v0.') }}" \
            --generate-notes \
            --draft \
            release/*
