name: "Release"

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: "write"

jobs:
  build:
    name: "Build"
    uses: "./.github/workflows/build.yaml"
    with:
      publish-coverage: false
      docker-image-development-tag: false
      docker-image-version-tag: true
      docker-image-latest-tag: true
      push-docker-image: true
    secrets: "inherit"

  release:
    name: "GitHub Release"
    needs:
      - "build"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Check out source code"
        uses: "actions/checkout@v7.0.0"
        with:
          fetch-depth: 0

      - name: "Download build artifacts"
        uses: "actions/download-artifact@v7.0.0"
        with:
          pattern: "cdrdao2audio-*"
          path: "release"
      
      - name: "Rename release artifacts"
        shell: "bash"
        run: |
          version="${{ needs.build.outputs.version }}"

          shopt -s nullglob
          artifacts=(release/cdrdao2audio-*/cdrdao2audio*)

          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No release artifacts found"
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            directory="$(basename "$(dirname "$artifact")")"
            platform="${directory#cdrdao2audio-}"

            if [[ "$artifact" == *.exe ]]; then
              extension=".exe"
            else
              extension=""
            fi

            mv "$artifact" \
              "release/cdrdao2audio-${version}-${platform}${extension}"
          done

          find release -type d -empty -delete
      
      - name: "Generate checksums"
        shell: "bash"
        run: |
          cd release
          sha256sum * > SHA256SUMS

      - name: "Generate release notes"
        id: "release-notes"
        shell: "bash"
        run: |
          repository="${{ github.repository }}"
          current_tag="${{ github.ref_name }}"
          previous_tag="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"

          log_format="- [`%h`](https://github.com/${repository}/commit/%H) %s"

          {
            echo "notes<<EOF"
            echo "# Changelog"
            echo

            if [ -n "${previous_tag}" ]; then
              git log --pretty=format:"${log_format}" "${previous_tag}..HEAD"
              echo
              echo
              echo "**Full Changelog**: [`${previous_tag}...${current_tag}`](https://github.com/${repository}/compare/${previous_tag}...${current_tag})"
            else
              git log --pretty=format:"${log_format}"
              echo
              echo
              echo "**Full Changelog**: [`${current_tag}`](https://github.com/${repository}/commits/${current_tag})"
            fi

            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "Create GitHub Release"
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          gh release create \
            "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.release-notes.outputs.notes }}" \
            --prerelease="${{ startsWith(github.ref_name, 'v0.') }}" \
            --verify-tag \
            --fail-on-no-commits \
            --draft \
            release/*
